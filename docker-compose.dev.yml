services:
  database:
    image: postgres:alpine
    container_name: database-dev
    env_file:
      - ./.env.database
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  backend:
    image: node:18-alpine
    container_name: backend-dev
    working_dir: /app
    command: sh -c "apk add --no-cache python3 make g++ && yarn install && yarn start:dev"
    volumes:
      - ./backend:/app
      - backend_node_modules_dev:/app/node_modules
    ports:
      - "5000:5000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - ./backend/.env
    depends_on:
      - database

  frontend:
    image: node:18-alpine
    container_name: frontend-dev
    working_dir: /app
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_HOST=localhost
      - WDS_SOCKET_PORT=3000
      - WATCHPACK_POLLING=true
      - NODE_OPTIONS=--openssl-legacy-provider
      - REACT_APP_API_URL=http://localhost:5000/api
    command: sh -c "yarn install && yarn start"
    volumes:
      - ./frontend:/app
      - frontend_node_modules_dev:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  adminer:
    image: adminer
    container_name: adminer-dev
    ports:
      - "8080:8080"
    depends_on:
      - database

volumes:
  postgres_data_dev:
  backend_node_modules_dev:
  frontend_node_modules_dev: